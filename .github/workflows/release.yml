name: Release Build & Deploy

on:
  workflow_dispatch:
    inputs:
      versionCode:
        description: 'Version Code (must be higher than previous)'
        required: true
      versionName:
        description: 'Version Name (e.g., 1.0.2)'
        required: true
      track:
        description: 'Google Play Track (internal/production)'
        default: 'internal'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Update Version Properties
        run: |
          echo "versionCode=${{ github.event.inputs.versionCode }}" > version.properties
          echo "versionName=${{ github.event.inputs.versionName }}" >> version.properties

      - name: Commit version update
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: bump version to ${{ github.event.inputs.versionName }} (${{ github.event.inputs.versionCode }})"
          file_pattern: version.properties

      - name: Restore Google Services JSON (Prod)
        run: |
          mkdir -p app/src/prod
          echo "${{ secrets.GOOGLE_SERVICES_JSON_PROD }}" | base64 --decode > app/src/prod/google-services.json

      - name: Authenticate with Google Cloud (WIF)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/keystore.jks

      - name: Build Release AAB
        run: ./gradlew bundleProdRelease
        env:
          KEYSTORE_PATH: "keystore.jks"
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Build Changelog
        id: build_changelog
        uses: mikepenz/release-changelog-builder-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: ${{ steps.auth.outputs.credentials_file_path }}
          packageName: br.com.schmittsolucoes.cacainfinita
          releaseFiles: app/build/outputs/bundle/prodRelease/*.aab
          track: ${{ github.event.inputs.track }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.build_changelog.outputs.changelog }}
          tag_name: v${{ github.event.inputs.versionName }}
          files: app/build/outputs/bundle/prodRelease/*.aab
